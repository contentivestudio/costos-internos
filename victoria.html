<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contentive Studio — Costos Victoria</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --orange: #F5A623;
    --lime: #B8E04A;
    --text: #f0ede8;
    --muted: #6b6b6b;
    --muted2: #3a3a3a;
    --red: #ff4444;
    --green: #4ade80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0 0 80px 0;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    background: var(--orange);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
  }

  .header-subtitle {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  /* FX BANNER */
  .fx-banner {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  .fx-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted2);
    flex-shrink: 0;
  }

  .fx-dot.live { background: var(--lime); animation: pulse 2s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .fx-rate {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--lime);
  }

  .fx-label { color: var(--muted); }
  .fx-error { color: var(--red); }

  /* SAVE STATUS */
  .save-status {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .save-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted2);
  }
  .save-dot.saved { background: var(--lime); }
  .save-dot.saving { background: var(--orange); animation: pulse 1s infinite; }

  /* AUTH */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 32px;
    padding: 40px;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  .auth-logo {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 32px;
  }

  .auth-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .auth-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 36px;
    line-height: 1.5;
  }

  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 14px 20px;
    background: var(--text);
    color: #1a1a1a;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .google-btn:hover { background: #e0ddd8; transform: translateY(-1px); }

  .google-btn svg { width: 18px; height: 18px; }

  /* MAIN APP */
  #app { display: none; }

  /* PROGRESS BAR */
  .progress-global {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .progress-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .progress-track {
    flex: 1;
    height: 3px;
    background: var(--muted2);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), var(--lime));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-pct {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--orange);
    min-width: 36px;
    text-align: right;
  }

  /* CONTENT */
  .content {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* SECTION BLOCK */
  .section-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .section-header.open {
    border-bottom-color: var(--border);
  }

  .section-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted2);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .section-indicator.partial { background: var(--orange); }
  .section-indicator.complete { background: var(--lime); }

  .section-name {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
  }

  .section-meta {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-count {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    color: var(--muted);
  }

  .chevron {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.25s;
  }

  .section-header.open .chevron { transform: rotate(180deg); }

  .section-body {
    display: none;
    flex-direction: column;
    gap: 0;
  }

  .section-body.open { display: flex; }

  /* SERVICE CARD */
  .service-card {
    border-bottom: 1px solid var(--border);
    padding: 20px;
  }

  .service-card:last-child { border-bottom: none; }

  .service-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 14px;
  }

  .service-info { flex: 1; }

  .service-name {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .service-badge {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 20px;
    background: var(--muted2);
    color: var(--muted);
  }

  .service-badge.parcial {
    background: rgba(245, 166, 35, 0.15);
    color: var(--orange);
  }

  .service-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    max-width: 500px;
  }

  /* PRICE BLOCK */
  .price-block {
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 220px;
  }

  .price-status {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: right;
    margin-bottom: 2px;
  }

  .price-status.filled { color: var(--lime); }

  .price-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .price-currency {
    position: absolute;
    left: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    pointer-events: none;
  }

  .price-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px 10px 28px;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    text-align: right;
  }

  .price-input:focus { border-color: var(--orange); }
  .price-input.has-value { border-color: var(--lime); color: var(--lime); }

  .price-label {
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    letter-spacing: 0.04em;
  }

  /* FX DISPLAY ROW */
  .fx-display-row {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }

  .fx-chip {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
  }

  .fx-chip-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .fx-chip-value {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
  }

  .fx-chip-value.active { color: var(--text); }
  .fx-chip.intl .fx-chip-value.active { color: var(--orange); }

  /* DETAIL TOGGLE */
  .detail-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: none;
    padding: 0;
    transition: color 0.2s;
    margin-top: 8px;
  }

  .detail-toggle:hover { color: var(--orange); }

  .detail-body {
    display: none;
    margin-top: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .detail-body.open { display: block; }

  .detail-title {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 10px;
  }

  .detail-text {
    font-size: 12px;
    color: #999;
    line-height: 1.7;
  }

  .detail-text .task-title {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #f0ede8;
    margin-top: 20px;
    margin-bottom: 8px;
    letter-spacing: 0.01em;
  }

  .detail-text .task-title:first-child {
    margin-top: 0;
  }

  .detail-text .task-line {
    display: block;
    margin-bottom: 2px;
  }

  /* DELIVERY TIME FIELD */
  .delivery-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .delivery-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .delivery-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .delivery-input:focus { border-color: var(--orange); }
  .delivery-input::placeholder { color: var(--muted2); }
  .delivery-input.has-value { border-color: rgba(184, 224, 74, 0.3); color: var(--lime); }

  /* USER CHIP */
  .user-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px 6px 6px;
  }

  .user-avatar {
    width: 24px; height: 24px;
    border-radius: 50%;
    object-fit: cover;
  }

  .user-name {
    font-size: 12px;
    color: var(--muted);
  }

  .logout-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: color 0.2s;
  }

  .logout-btn:hover { color: var(--red); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 12px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 999;
    max-width: 300px;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
  .toast-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">

    <div class="auth-title">Hola, Victoria 👋</div>

<!-- MAIN APP -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="logo-dot"></div>
      <div>
        <div class="header-title">Contentive Studio — Costos</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const CLIENT_ID = '1089154369329-ofb9b8a7au5ds7c0kthg7nmul2n0srj3.apps.googleusercontent.com';
const DRIVE_FOLDER_ID = '1g0Rnv7297gNZ2h2HK86eh7vTHZRaboP1';
const FILE_NAME = 'costos_victoria_v1.json';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';

// ─── SERVICES DATA ────────────────────────────────────────────────────────────
const SECTIONS = [
  {
    id: 'estrategia',
    name: 'Gestión y Estrategia de Redes Sociales',
    services: [
      {
        id: 'plan_contenidos',
        name: 'Plan de Contenidos Estratégico',
        badge: null,
        desc: 'Diagnóstico de comunicación, definición estratégica y planificación del primer mes.',
        tasks: `Lo que hacés vos en este servicio:

Recibís el brief del cliente y conducís el diagnóstico de comunicación: analizás el estado actual de la marca en redes, identificás brechas, oportunidades y problemas de coherencia. Si la marca no tiene presencia previa, el diagnóstico lo hacés sobre el negocio, el mercado y la competencia.

Con esa base definís los pilares estratégicos:
• Objetivos de comunicación claros y medibles
• Tono de voz y personalidad de marca
• Arquetipos de audiencia (quién es, qué consume, qué lo mueve)
• Ejes temáticos: las categorías de contenido que la marca va a trabajar de forma sistemática

Construís la estructura de contenidos: tipos de publicación por eje, formatos recomendados por objetivo, frecuencia por plataforma y dinámicas de interacción.

Desarrollás la guía de redacción: cómo escribe la marca, qué evita, qué palabras la definen. Nada visual — eso es territorio de Daniela.

Cerrás con la planificación del mes 1: calendario con ideas concretas para cada publicación — tema, formato, eje temático y recomendaciones de copy y hashtags.

Tus entregables: documento estratégico en PDF, calendario del mes 1 en formato editable, guía de redacción y tono de voz.`
      },
      {
        id: 'community_pack',
        name: 'Community Pack (diseño + redacción)',
        badge: null,
        desc: 'Planificación mensual, conceptos narrativos para Daniela y copys completos de las 12 publicaciones.',
        tasks: `Lo que hacés vos en este servicio:

Al inicio de cada mes conducís el briefing con el cliente: definís temas, campañas, productos o mensajes clave del período.

Definís los 12 temas o ideas de publicación, organizados en el calendario con eje temático, formato y secuencia. Te asegurás de que haya diversidad de formatos y mensajes para que el feed no se vuelva monótono.

Para cada publicación, conceptualizás el mensaje: qué tiene que decir la pieza, desde qué ángulo, con qué jerarquía de información. Eso es el brief narrativo que le pasás a Daniela. No definís nada visual — Daniela toma las decisiones de diseño.

Redactás los copys completos de las 12 publicaciones: texto principal, llamado a la acción y hashtags estratégicos en el tono de voz de la marca.

Elaborás la guía de publicación: orden recomendado, mejores horarios, recomendaciones de interacción post-publicación y notas estratégicas por pieza.

Tus entregables: planificación mensual, brief narrativo para Daniela, documento de copys y hashtags, guía de publicación.`
      },
      {
        id: 'consultoria',
        name: 'Consultoría de Estrategia Digital (1 sesión)',
        badge: null,
        desc: 'Soporte estratégico antes y después de la sesión que conduce Pedro.',
        tasks: `Lo que hacés vos en este servicio:

La sesión la conduce Pedro. Tu rol es de soporte estratégico antes y después.

Antes de la sesión (junto a Pedro): analizás el estado digital actual de la marca — redes, comunicación, métricas disponibles y coherencia con los objetivos del negocio. Pedro complementa con su conocimiento del cliente y criterio de negocio. Ese análisis conjunto es la materia prima que Pedro usa durante la reunión.

Después de la sesión: elaborás los entregables post-reunión bajo supervisión de Pedro: resumen ejecutivo en PDF, plan de acción de 30 días con tareas concretas ordenadas por impacto y esfuerzo, y checklist de implementación inmediata.

Tus entregables: contribución al informe de diagnóstico previo, resumen ejecutivo post-sesión, plan de acción de 30 días.`
      },
      {
        id: 'auditoria',
        name: 'Auditoría de Marca Digital',
        badge: null,
        desc: 'Elaboración del informe y tabla de prioridades a partir del insumo que te pasa Pedro.',

// ─── STATE ────────────────────────────────────────────────────────────────────
let prices = {};
let times = {};
let fxRate = null;
let tokenClient;
let accessToken = null;
let driveFileId = null;
let saveTimer = null;
let userInfo = null;

// ─── GOOGLE AUTH ──────────────────────────────────────────────────────────────
function initGoogleAuth() {
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: onGoogleSignIn,
    auto_select: false,
  });

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: onTokenReceived,
  });
}

function handleLogin() {
  google.accounts.id.prompt((notification) => {
    if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
      tokenClient.requestAccessToken({ prompt: 'consent' });
    }
  });
}

async function onGoogleSignIn(response) {
  const payload = parseJwt(response.credential);
  userInfo = payload;
  tokenClient.requestAccessToken({ prompt: '' });
}

async function onTokenReceived(tokenResponse) {
  if (tokenResponse.error) { showToast('Error de autenticación', 'error'); return; }
  accessToken = tokenResponse.access_token;

  if (!userInfo) {
    try {
      const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      userInfo = await r.json();
    } catch(e) {}
  }

  showApp();
}

function parseJwt(token) {
  try {
    return JSON.parse(atob(token.split('.')[1]));
  } catch(e) { return {}; }
}

function handleLogout() {
  google.accounts.id.disableAutoSelect();
  accessToken = null;
  driveFileId = null;
  prices = {};
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ─── APP INIT ─────────────────────────────────────────────────────────────────
async function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  if (userInfo) {
    document.getElementById('userAvatar').src = userInfo.picture || '';
    document.getElementById('userName').textContent = userInfo.given_name || userInfo.name || 'Victoria';
  }

  await fetchFxRate();
  await loadFromDrive();
  renderServices();
  updateGlobalProgress();
}

// ─── FX RATE ──────────────────────────────────────────────────────────────────
async function fetchFxRate() {
  try {
    const res = await fetch('https://dolarapi.com/v1/dolares/oficial');
    const data = await res.json();
    fxRate = data.venta;
    document.getElementById('fxRate').textContent = `$ ${fxRate.toLocaleString('es-AR', {minimumFractionDigits:2})}`;
    document.getElementById('fxTime').textContent = `· Actualizado ${data.fechaActualizacion ? new Date(data.fechaActualizacion).toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'}) : 'hoy'}`;
    document.getElementById('fxDot').classList.add('live');
  } catch(e) {
    document.getElementById('fxRate').innerHTML = '<span class="fx-error">No disponible</span>';
    document.getElementById('fxTime').textContent = '· Revisá tu conexión';
    fxRate = null;
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderServices() {
  const container = document.getElementById('servicesContent');
  container.innerHTML = '';

  SECTIONS.forEach((section, si) => {
    const filled = section.services.filter(s => prices[s.id] && prices[s.id] > 0).length;
    const total = section.services.length;

    const block = document.createElement('div');
    block.className = 'section-block';

    const indClass = filled === 0 ? '' : filled === total ? 'complete' : 'partial';

    block.innerHTML = `
      <div class="section-header open" onclick="toggleSection(this)">
        <div class="section-header-left">
          <div class="section-indicator ${indClass}" id="ind-${section.id}"></div>
          <span class="section-name">${section.name}</span>
        </div>
        <div class="section-meta">
          <span class="section-count" id="count-${section.id}">${filled} / ${total}</span>
          <span class="chevron">▲</span>
        </div>
      </div>
      <div class="section-body open" id="body-${section.id}"></div>
    `;

    container.appendChild(block);

    const body = block.querySelector(`#body-${section.id}`);

    section.services.forEach(service => {
      const card = document.createElement('div');
      card.className = 'service-card';

      const val = prices[service.id] || 0;
      const hasVal = val > 0;

      card.innerHTML = `
        <div class="service-top">
          <div class="service-info">
            <div class="service-name">
              ${service.name}
              ${service.badge ? `<span class="service-badge ${service.badgeType||''}">${service.badge}</span>` : ''}
            </div>
            <div class="service-desc">${service.desc}</div>
          </div>
          <div class="price-block">
            <div class="price-status ${hasVal ? 'filled' : ''}" id="status-${service.id}">
              ${hasVal ? 'Cargado' : 'Pendiente'}
            </div>
            <div class="price-input-wrap">
              <span class="price-currency">$</span>
              <input
                type="number"
                class="price-input ${hasVal ? 'has-value' : ''}"
                id="input-${service.id}"
                placeholder="0"
                value="${val > 0 ? val : ''}"
                oninput="onPriceInput('${service.id}', '${section.id}', this)"
              />
            </div>
            <div class="price-label">Precio total del servicio en ARS</div>
            <div class="fx-display-row">
              <div class="fx-chip">
                <div class="fx-chip-label">USD Oficial</div>
                <div class="fx-chip-value ${hasVal ? 'active' : ''}" id="usd-${service.id}">
                  ${hasVal && fxRate ? 'U$S ' + (val / fxRate).toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—'}
                </div>
              </div>
              <div class="fx-chip intl">
                <div class="fx-chip-label">Internacional +20%</div>
                <div class="fx-chip-value ${hasVal ? 'active' : ''}" id="intl-${service.id}">
                  ${hasVal && fxRate ? 'U$S ' + (val * 1.2 / fxRate).toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2}) : '—'}
                </div>
              </div>
            </div>
          </div>
        </div>
        <button class="detail-toggle" onclick="toggleDetail('detail-${service.id}', this)">
          <span>▼</span> Ver mis tareas en este servicio
        </button>
        <div class="detail-body" id="detail-${service.id}">
          <div class="detail-title">Tus tareas</div>
          <div class="detail-text">${formatTasks(service.tasks)}</div>
          <div class="delivery-row">
            <span class="delivery-label">⏱ Tiempo estimado</span>
            <input
              type="text"
              class="delivery-input ${(times[service.id] && times[service.id].trim()) ? 'has-value' : ''}"
              id="time-${service.id}"
              placeholder="Ej: 3 – 5 días hábiles"
              value="${times[service.id] || ''}"
              oninput="onTimeInput('${service.id}', this)"
            />
          </div>
        </div>
      `;

      body.appendChild(card);
    });
  });
}

// ─── FORMAT TASKS ─────────────────────────────────────────────────────────────
function formatTasks(text) {
  const lines = text.split('\n');
  let html = '';
  for (const line of lines) {
    const trimmed = line.trim();
    if (trimmed === '') continue;
    // Subtítulo: cualquier línea que termine en ":" y no empiece con bullet
    const isTitle = (trimmed.endsWith(':') && !trimmed.startsWith('•') && !trimmed.startsWith('-'))
      || /^Etapa\s+\d+\s*[—–-]/.test(trimmed);
    if (isTitle) {
      html += `<span class="task-title">${trimmed}</span>`;
    } else {
      html += `<span class="task-line">${trimmed}</span>`;
    }
  }
  return html;
}

function toggleSection(header) {
  header.classList.toggle('open');
  const sectionId = header.querySelector('.section-indicator').id.replace('ind-', '');
  const body = document.getElementById(`body-${sectionId}`);
  body.classList.toggle('open');
  const chevron = header.querySelector('.chevron');
  chevron.textContent = body.classList.contains('open') ? '▲' : '▼';
}

function toggleDetail(id, btn) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
  btn.innerHTML = el.classList.contains('open')
    ? '<span>▲</span> Ocultar detalle'
    : '<span>▼</span> Ver mis tareas en este servicio';
}

function onPriceInput(serviceId, sectionId, input) {
  const val = parseFloat(input.value) || 0;
  prices[serviceId] = val;

  const hasVal = val > 0;
  input.classList.toggle('has-value', hasVal);

  const status = document.getElementById(`status-${serviceId}`);
  status.textContent = hasVal ? 'Cargado' : 'Pendiente';
  status.classList.toggle('filled', hasVal);

  const usdEl = document.getElementById(`usd-${serviceId}`);
  const intlEl = document.getElementById(`intl-${serviceId}`);

  if (hasVal && fxRate) {
    usdEl.textContent = 'U$S ' + (val / fxRate).toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});
    intlEl.textContent = 'U$S ' + (val * 1.2 / fxRate).toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});
    usdEl.classList.add('active');
    intlEl.classList.add('active');
  } else {
    usdEl.textContent = '—';
    intlEl.textContent = '—';
    usdEl.classList.remove('active');
    intlEl.classList.remove('active');
  }

  updateSectionProgress(sectionId);
  updateGlobalProgress();
  scheduleSave();
}

function onTimeInput(serviceId, input) {
  const val = input.value.trim();
  if (val) {
    times[serviceId] = val;
    input.classList.add('has-value');
  } else {
    delete times[serviceId];
    input.classList.remove('has-value');
  }
  scheduleSave();
}

function updateSectionProgress(sectionId) {
  const section = SECTIONS.find(s => s.id === sectionId);
  if (!section) return;
  const filled = section.services.filter(s => prices[s.id] && prices[s.id] > 0).length;
  const total = section.services.length;
  document.getElementById(`count-${sectionId}`).textContent = `${filled} / ${total}`;
  const ind = document.getElementById(`ind-${sectionId}`);
  ind.className = 'section-indicator';
  if (filled > 0) ind.classList.add(filled === total ? 'complete' : 'partial');
}

function updateGlobalProgress() {
  const allServices = SECTIONS.flatMap(s => s.services);
  const filled = allServices.filter(s => prices[s.id] && prices[s.id] > 0).length;
  const total = allServices.length;
  const pct = total > 0 ? Math.round((filled / total) * 100) : 0;
  document.getElementById('globalFill').style.width = pct + '%';
  document.getElementById('globalPct').textContent = pct + '%';
}

// ─── DRIVE ────────────────────────────────────────────────────────────────────
async function loadFromDrive() {
  setSaveStatus('loading');
  try {
    const search = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${FILE_NAME}' and '${DRIVE_FOLDER_ID}' in parents and trashed=false&fields=files(id,name)`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    const data = await search.json();
    if (data.files && data.files.length > 0) {
      driveFileId = data.files[0].id;
      const content = await fetch(
        `https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,
        { headers: { Authorization: `Bearer ${accessToken}` } }
      );
      prices = await content.json();
      if (prices.times) { times = prices.times; delete prices.times; }
      setSaveStatus('saved');
      showToast('Datos cargados desde Drive', 'ok');
    } else {
      setSaveStatus('idle');
    }
  } catch(e) {
    setSaveStatus('idle');
  }
}

async function saveToDrive() {
  if (!accessToken) return;
  setSaveStatus('saving');
  const body = JSON.stringify({ ...prices, times });
  const blob = new Blob([body], { type: 'application/json' });

  try {
    if (driveFileId) {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: blob
      });
    } else {
      const meta = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: FILE_NAME, parents: [DRIVE_FOLDER_ID] })
      });
      const metaData = await meta.json();
      driveFileId = metaData.id;
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: blob
      });
    }
    setSaveStatus('saved');
    showToast('Guardado en Drive ✓', 'ok');
  } catch(e) {
    setSaveStatus('error');
    showToast('Error al guardar. Intentá de nuevo.', 'error');
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  setSaveStatus('saving');
  saveTimer = setTimeout(saveToDrive, 1500);
}

function setSaveStatus(state) {
  const dot = document.getElementById('saveDot');
  const txt = document.getElementById('saveText');
  dot.className = 'save-dot';
  if (state === 'saved') { dot.classList.add('saved'); txt.textContent = 'Guardado'; }
  else if (state === 'saving') { dot.classList.add('saving'); txt.textContent = 'Guardando...'; }
  else if (state === 'error') { txt.textContent = 'Error al guardar'; }
  else if (state === 'loading') { dot.classList.add('saving'); txt.textContent = 'Cargando...'; }
  else { txt.textContent = 'Sin cambios'; }
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  const dot = document.getElementById('toastDot');
  document.getElementById('toastMsg').textContent = msg;
  dot.style.background = type === 'ok' ? 'var(--lime)' : type === 'error' ? 'var(--red)' : 'var(--orange)';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
