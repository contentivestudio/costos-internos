<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contentive Studio — Costos Pedro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');
  :root {
    --bg:#0e0e0e; --surface:#161616; --surface2:#1e1e1e; --border:#2a2a2a;
    --orange:#F5A623; --lime:#B8E04A; --text:#f0ede8; --muted:#6b6b6b;
    --muted2:#3a3a3a; --red:#ff4444; --green:#4ade80;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-weight:300; min-height:100vh; padding:0 0 80px; }
  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:20px 32px; position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; gap:20px; }
  .header-left { display:flex; align-items:center; gap:16px; }
  .logo-dot { width:10px; height:10px; background:var(--orange); border-radius:50%; flex-shrink:0; }
  .header-title { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; }
  .header-subtitle { font-size:12px; color:var(--muted); letter-spacing:.04em; }
  .header-right { display:flex; align-items:center; gap:24px; }
  .save-status { font-size:11px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  .save-dot { width:6px; height:6px; border-radius:50%; background:var(--muted2); }
  .save-dot.saved { background:var(--lime); }
  .save-dot.saving { background:var(--orange); animation:pulse 1s infinite; }
  .save-dot.error { background:var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .user-chip { display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:6px 12px 6px 6px; }
  .user-name { font-size:12px; color:var(--muted); }
  .logout-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:11px; padding:4px 8px; border-radius:6px; transition:color .2s; }
  .logout-btn:hover { color:var(--red); }
  #auth-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:32px; padding:40px; }
  .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:48px 40px; width:100%; max-width:400px; text-align:center; }
  .auth-logo { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--orange); margin-bottom:32px; }
  .auth-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; margin-bottom:8px; }
  .auth-sub { font-size:13px; color:var(--muted); margin-bottom:36px; line-height:1.5; }
  .pin-display { display:flex; justify-content:center; gap:16px; margin-bottom:12px; }
  .pin-dot { width:16px; height:16px; border-radius:50%; border:2px solid var(--border); background:transparent; transition:all .15s; }
  .pin-dot.filled { background:var(--orange); border-color:var(--orange); }
  .pin-dot.error { background:var(--red); border-color:var(--red); }
  .pin-error { font-size:12px; color:var(--red); text-align:center; min-height:18px; margin-bottom:8px; }
  .pin-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:8px; }
  .pin-btn { background:var(--surface2); border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:'Syne',sans-serif; font-size:20px; font-weight:700; padding:18px 0; cursor:pointer; transition:all .15s; user-select:none; }
  .pin-btn:active { background:var(--orange); color:#000; transform:scale(.95); }
  .pin-btn.pin-del { font-size:18px; color:var(--muted); }
  .pin-btn.pin-empty { background:transparent; border-color:transparent; cursor:default; }
  .pin-btn.pin-empty:active { background:transparent; transform:none; }
  #app { display:none; }
  .progress-global { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 32px; display:flex; align-items:center; gap:16px; }
  .progress-label { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
  .progress-track { flex:1; height:3px; background:var(--muted2); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--orange),var(--lime)); border-radius:2px; transition:width .4s; width:0%; }
  .progress-pct { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; color:var(--orange); min-width:36px; text-align:right; }

  /* TARIFA GLOBAL */
  .tarifa-global-bar { background:var(--surface2); border-bottom:1px solid var(--border); padding:10px 32px; display:flex; align-items:center; gap:16px; }
  .tarifa-global-label { font-size:11px; color:var(--muted); letter-spacing:.04em; white-space:nowrap; }
  .tarifa-global-wrap { display:flex; align-items:center; gap:8px; }
  .tarifa-input { width:130px; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:5px 8px 5px 22px; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:var(--lime); outline:none; }
  .tarifa-input:focus { border-color:var(--orange); }
  .tarifa-currency { font-family:'Syne',sans-serif; font-size:12px; color:var(--muted); position:absolute; left:8px; pointer-events:none; }
  .tarifa-chips { display:flex; gap:6px; }
  .tarifa-chip { font-size:11px; color:var(--muted); background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:3px 8px; }

  .content { max-width:860px; margin:0 auto; padding:32px 24px; display:flex; flex-direction:column; gap:12px; }
  .section-block { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .section-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; cursor:pointer; user-select:none; border-bottom:1px solid transparent; transition:border-color .2s; }
  .section-header.open { border-bottom-color:var(--border); }
  .section-header-left { display:flex; align-items:center; gap:12px; }
  .section-indicator { width:8px; height:8px; border-radius:50%; background:var(--muted2); flex-shrink:0; transition:background .3s; }
  .section-indicator.partial { background:var(--orange); }
  .section-indicator.complete { background:var(--lime); }
  .section-name { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; }
  .section-meta { display:flex; align-items:center; gap:12px; }
  .section-count { font-family:'Syne',sans-serif; font-size:11px; color:var(--muted); }
  .chevron { color:var(--muted); font-size:12px; transition:transform .25s; }
  .section-header.open .chevron { transform:rotate(180deg); }
  .section-body { display:none; flex-direction:column; }
  .section-body.open { display:flex; }
  .service-card { border-bottom:1px solid var(--border); padding:20px; }
  .service-card:last-child { border-bottom:none; }
  .service-top { display:flex; align-items:flex-start; justify-content:space-between; gap:20px; margin-bottom:14px; }
  .service-info { flex:1; }
  .service-name { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; color:var(--text); margin-bottom:4px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .service-badge { font-size:9px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; padding:2px 7px; border-radius:20px; background:var(--muted2); color:var(--muted); }
  .service-badge.parcial { background:rgba(245,166,35,.15); color:var(--orange); }
  .service-desc { font-size:12px; color:var(--muted); line-height:1.5; max-width:500px; }
  .price-block { display:flex; flex-direction:column; gap:6px; min-width:220px; }
  .price-status { font-family:'Syne',sans-serif; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); text-align:right; }
  .price-status.filled { color:var(--lime); }
  .price-big { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; text-align:right; }
  .price-subs { display:flex; flex-direction:column; gap:3px; align-items:flex-end; }
  .price-sub-chip { font-size:11px; color:var(--muted); background:var(--surface2); border:1px solid var(--border); border-radius:5px; padding:2px 7px; }
  .price-label { font-size:10px; color:var(--muted); text-align:right; letter-spacing:.04em; }
  .price-input-wrap { position:relative; display:flex; align-items:center; }
  .price-currency { position:absolute; left:12px; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:var(--muted); pointer-events:none; }
  .price-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 12px 10px 28px; font-family:'Syne',sans-serif; font-size:16px; font-weight:700; color:var(--text); outline:none; transition:border-color .2s; text-align:right; -moz-appearance:textfield; }
  .price-input::-webkit-outer-spin-button, .price-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  .price-input:focus { border-color:var(--orange); }
  .price-input.has-value { border-color:var(--lime); color:var(--lime); }
  .price-input:disabled { opacity:.5; cursor:not-allowed; }
  .price-input::placeholder { color:var(--muted2); }
  .hours-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-top:4px; }
  .hours-item { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
  .hours-item-label { font-size:10px; color:var(--muted); letter-spacing:.04em; margin-bottom:6px; }
  .hours-item-row { display:flex; align-items:center; gap:6px; }
  .hours-input { width:56px; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:6px 8px; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:var(--text); text-align:center; outline:none; -moz-appearance:textfield; }
  .hours-input::-webkit-outer-spin-button, .hours-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  .hours-input:focus { border-color:var(--orange); }
  .hours-input:disabled { cursor:not-allowed; opacity:.4; }
  .hours-unit { font-size:10px; color:var(--muted); }
  .hours-result { margin-left:auto; font-family:'Syne',sans-serif; font-size:12px; font-weight:700; color:var(--text); }
  .toggle-row { display:flex; align-items:center; justify-content:space-between; gap:16px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-top:12px; }
  .toggle-label { font-size:12px; color:var(--text); font-weight:500; }
  .toggle-sub { font-size:10px; color:var(--muted); margin-top:2px; }
  .switch { position:relative; width:38px; height:22px; flex-shrink:0; }
  .switch input { opacity:0; width:0; height:0; }
  .switch-track { position:absolute; inset:0; background:var(--muted2); border-radius:11px; cursor:pointer; transition:.2s; }
  .switch-track::before { content:''; position:absolute; width:16px; height:16px; left:3px; bottom:3px; background:var(--text); border-radius:50%; transition:.2s; }
  .switch input:checked + .switch-track { background:var(--lime); }
  .switch input:checked + .switch-track::before { transform:translateX(16px); background:#0e0e0e; }
  .am-total-row { display:flex; justify-content:space-between; align-items:center; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
  .am-total-label { font-family:'Syne',sans-serif; font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
  .am-total-value { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; color:var(--orange); }
  .am-total-subs { display:flex; gap:6px; }
  .decreasing-row { display:flex; align-items:center; gap:14px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-top:4px; }
  .decreasing-field { display:flex; flex-direction:column; gap:4px; }
  .decreasing-field label { font-size:9px; color:var(--muted); letter-spacing:.04em; }
  .decreasing-breakdown { font-size:10px; color:var(--muted); margin-top:8px; line-height:1.6; }
  .detail-toggle { display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); cursor:pointer; border:none; background:none; padding:0; transition:color .2s; margin-top:8px; }
  .detail-toggle:hover { color:var(--orange); }
  .detail-body { display:none; margin-top:14px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:16px; }
  .detail-body.open { display:block; }
  .detail-title { font-family:'Syne',sans-serif; font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--orange); margin-bottom:10px; }
  .detail-text { font-size:12px; color:#999; line-height:1.7; }
  .detail-text .task-title { display:block; font-family:'Syne',sans-serif; font-size:14px; font-weight:700; color:#f0ede8; margin-top:20px; margin-bottom:8px; }
  .detail-text .task-title:first-child { margin-top:0; }
  .detail-text .task-line { display:block; margin-bottom:2px; }
  .note-box { font-size:11px; color:var(--muted); line-height:1.6; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-top:10px; }
  .note-box strong { color:var(--text); }
  .adicional-block { margin-top:14px; padding-top:14px; border-top:1px dashed var(--border); }
  .adicional-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .adicional-label { font-family:'Syne',sans-serif; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
  .adicional-sub { font-size:10px; color:var(--muted2); }
  .adicional-row { display:flex; gap:10px; align-items:flex-start; flex-wrap:wrap; }
  .adicional-desc-input { flex:1; min-width:180px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:9px 12px; font-family:'DM Sans',sans-serif; font-size:12px; color:var(--text); outline:none; }
  .adicional-desc-input:focus { border-color:var(--orange); }
  .adicional-desc-input::placeholder { color:var(--muted2); }
  .adicional-price-wrap { position:relative; width:140px; }
  .adicional-price-wrap .price-currency { position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:12px; }
  .adicional-price-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:9px 12px 9px 26px; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:var(--text); outline:none; text-align:right; -moz-appearance:textfield; }
  .adicional-price-input::-webkit-outer-spin-button, .adicional-price-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  .adicional-price-input:focus { border-color:var(--orange); }
  .adicional-price-input.has-value { color:var(--lime); border-color:var(--lime); }
  .toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 18px; font-size:12px; color:var(--text); display:flex; align-items:flex-start; gap:8px; opacity:0; transform:translateY(8px); transition:all .25s; pointer-events:none; z-index:999; max-width:420px; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; margin-top:4px; }
  @media (max-width:640px) {
    .header { padding:16px 18px; } .header-subtitle { display:none; }
    .content { padding:24px 14px; } .service-top { flex-direction:column; }
    .price-block { min-width:0; width:100%; }
  }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Contentive Studio</div>
    <div class="auth-title">Hola, Pedro 👋</div>
    <div class="auth-sub">Ingresá tu PIN para acceder al módulo de carga de tus servicios.</div>
    <div class="pin-display" id="pinDisplay">
      <div class="pin-dot" id="pin0"></div><div class="pin-dot" id="pin1"></div>
      <div class="pin-dot" id="pin2"></div><div class="pin-dot" id="pin3"></div>
    </div>
    <div id="pinError" class="pin-error"></div>
    <div class="pin-pad">
      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn pin-empty"></button>
      <button class="pin-btn" onclick="pinPress('0')">0</button>
      <button class="pin-btn pin-del" onclick="pinDelete()">⌫</button>
    </div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="logo-dot"></div>
      <div>
        <div class="header-title">Contentive Studio — Costos</div>
        <div class="header-subtitle">Pedro · Dirección, Audiovisual &amp; Bodas</div>
      </div>
    </div>
    <div class="header-right">
      <div class="save-status">
        <div class="save-dot" id="saveDot"></div>
        <span id="saveText">Sin cambios</span>
      </div>
      <div class="user-chip"><span class="user-name">Pedro</span></div>
      <button class="logout-btn" onclick="handleLogout()">Salir</button>
    </div>
  </div>

  <div class="progress-global">
    <span class="progress-label">Completado</span>
    <div class="progress-track"><div class="progress-fill" id="globalFill"></div></div>
    <span class="progress-pct" id="globalPct">0%</span>
  </div>

  <!-- TARIFA GLOBAL EDITABLE -->
  <div class="tarifa-global-bar">
    <span class="tarifa-global-label">Tu tarifa de dirección/hora:</span>
    <div class="tarifa-global-wrap" style="position:relative">
      <span class="tarifa-currency" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);font-family:'Syne',sans-serif;font-size:12px;color:var(--muted);pointer-events:none">$</span>
      <input type="number" class="tarifa-input" id="tarifaHoraInput" value="9000"
        style="-moz-appearance:textfield"
        oninput="onTarifaChange(this)">
    </div>
    <div class="tarifa-chips">
      <span class="tarifa-chip" id="tarifaUSD">U$S —</span>
      <span class="tarifa-chip" id="tarifaUSDIntl">U$S — (+20%)</span>
    </div>
  </div>

  <div class="content" id="servicesContent"></div>
</div>

<div class="toast" id="toast">
  <div class="toast-dot" id="toastDot"></div>
  <span id="toastMsg"></span>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxXrP_rQtJo-8nE8r5JMlrSlVH7WBw9NOYAhh4--PhjatbArJMiMDCeHXX8gGFGpaADYw/exec';
const CORRECT_PIN = '2510';

// ─── SECCIONES — orden igual al panel general ────────────────────────────────
const SECTIONS = [
  // 1. DIRECCIÓN CUENTAS MENSUALES
  {
    id: 'direccion',
    name: 'Dirección & Account Management — Cuentas Actuales',
    type: 'am',
    note: 'Tu costo de dirección en las cuentas mensuales activas. Las horas son editables — ajustalas si cambia la carga real de cada cuenta.',
    services: [
      { id:'am_donna', name:'Panadería Venezolana Donna', desc:'Costo de Dirección mensual: briefing, supervisión, reuniones, presentación y presencia en rodaje (si aplica).', tasks:`Lo que hacés vos:\n\nSos el responsable final de la cuenta. Conducís el briefing mensual, supervisás y aprobás cada entrega, sostenés las reuniones de seguimiento y armás la presentación de resultados. Si hay producción audiovisual activa, estás presente en el rodaje.` },
      { id:'am_tecnotips', name:'TecnoTips', desc:'Costo de Dirección mensual: briefing, supervisión, reuniones, presentación y presencia en rodaje (si aplica).', tasks:`Lo que hacés vos:\n\nIgual que Donna — sos el responsable final. Briefing, supervisión, aprobación, reuniones y presentación de resultados.` },
      { id:'am_seklou', name:'Seklou', desc:'Costo de Dirección mensual: briefing, supervisión, reuniones, presentación y presencia en rodaje (si aplica).', tasks:`Lo que hacés vos:\n\nIgual que las demás cuentas — responsable final. Briefing, supervisión, aprobación, reuniones y presentación.` }
    ]
  },
  // 2. BRANDING Y DISEÑO (puntual)
  {
    id: 'puntual_branding_sec',
    name: 'Branding, Identidad Visual & Diseño Gráfico — Proyectos Puntuales',
    type: 'am_puntual',
    note: 'Aplicá esta sección a cualquier proyecto puntual de Branding o Diseño (no cuenta mensual). Mismas actividades que la Dirección mensual, aplicadas una sola vez al proyecto.',
    services: [
      { id:'puntual_branding', name:'Branding, Identidad Visual & Diseño Gráfico', desc:'Contacto comercial, cierre de venta, briefing, análisis y supervisión del proyecto. Aplica a cualquier proyecto puntual de esta categoría.', tasks:`Lo que hacés vos:\n\nHacés el contacto inicial, cerrás la venta, generás las preguntas de briefing, analizás las respuestas y armás el brief para Daniela. Primer y último filtro — nada sale al cliente sin tu aprobación.` }
    ]
  },
  // 3. FOTOGRAFÍA (catálogo propio)
  {
    id: 'fotografia_catalogo',
    name: 'Fotografía — Catálogo de Servicios',
    type: 'catalog',

// ─── PIN ─────────────────────────────────────────────────────────────────────
function pinPress(d) { if(pinBuffer.length>=4)return; pinBuffer+=d; updatePinDots(); if(pinBuffer.length===4)setTimeout(checkPin,120); }
function pinDelete() { pinBuffer=pinBuffer.slice(0,-1); updatePinDots(); document.getElementById('pinError').textContent=''; document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('error')); }
function updatePinDots() { for(let i=0;i<4;i++){const d=document.getElementById('pin'+i);d.classList.toggle('filled',i<pinBuffer.length);d.classList.remove('error');} }
function checkPin() {
  if(pinBuffer===CORRECT_PIN){ showApp(); }
  else {
    document.querySelectorAll('.pin-dot').forEach(d=>{d.classList.remove('filled');d.classList.add('error');});
    document.getElementById('pinError').textContent='PIN incorrecto. Intentá de nuevo.';
    setTimeout(()=>{pinBuffer='';updatePinDots();document.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('error'));document.getElementById('pinError').textContent='';},900);
  }
}
function handleLogout() {
  pinBuffer=''; driveLoadedOk=false;
  prices={}; times={}; amHours={}; avHours={}; packPrices={}; weddingConfig={}; coursePrices={}; adicionales={}; avTarifas={};
  updatePinDots(); document.getElementById('pinError').textContent='';
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}

// ─── APP INIT ─────────────────────────────────────────────────────────────────
async function showApp() {
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';
  await fetchFxRate();
  await loadFromScript();
  renderServices();
  updateGlobalProgress();
}

// ─── FX ───────────────────────────────────────────────────────────────────────
async function fetchFxRate() {
  try {
    const r = await fetch('https://dolarapi.com/v1/dolares/oficial');
    const d = await r.json();
    fxRate = d.venta;
    updateTarifaChips();
    refreshAllChips(); // actualiza chips ya renderizados
  } catch(e) { fxRate = null; }
}

// Refresca todos los chips de conversión en la página tras cargar FX
function refreshAllChips() {
  // chips de simple_price y wedding
  document.querySelectorAll('[id^="chips-"]').forEach(el => {
    const id = el.id.replace('chips-','');
    // wedding config
    const wCfg = weddingConfig[id];
    if(wCfg) { el.innerHTML = priceChips(wCfg.tarifaHora||0); return; }
    // simple price
    const val = prices[id]||0;
    if(val) el.innerHTML = priceChips(val);
  });
  // chips inline de packs y cursos
  document.querySelectorAll('.pack-chips-inline').forEach(el => {
    // encontrar el valor del input hermano
    const input = el.closest('.hours-item')?.querySelector('input[type="number"]');
    if(!input) return;
    const val = parseFloat(input.value)||0;
    if(val && fxRate) el.innerHTML = `${fmtUSD(val)||''} · ${fmtUSDIntl(val)||''}`;
  });
  // chips de AM totales
  document.querySelectorAll('[data-am-total]').forEach(el => {
    const id = el.getAttribute('data-am-total');
    const costo = getAmCosto(id);
    if(costo) el.innerHTML = `<div class="am-total-value">${fmt(costo)}</div>${priceChips(costo)}`;
  });
}

function updateTarifaChips() {
  const input = document.getElementById('tarifaHoraInput');
  if(!input) return;
  const val = parseFloat(input.value) || 0;
  const usdEl = document.getElementById('tarifaUSD');
  const usdIntlEl = document.getElementById('tarifaUSDIntl');
  if(fxRate && val > 0) {
    usdEl.textContent = 'U$S ' + (val/fxRate).toLocaleString('es-AR',{minimumFractionDigits:2});
    usdIntlEl.textContent = 'U$S ' + (val/fxRate*1.2).toLocaleString('es-AR',{minimumFractionDigits:2}) + ' (+20%)';
  } else {
    usdEl.textContent = 'U$S —';
    usdIntlEl.textContent = 'U$S — (+20%)';
  }
}

function onTarifaChange(input) {
  tarifaDireccion = parseFloat(input.value) || 9000;
  updateTarifaChips();
  renderServices();
  updateGlobalProgress();
  scheduleSave();
}

// ─── DRIVE ────────────────────────────────────────────────────────────────────
async function loadFromScript() {
  driveLoadedOk=false; setSaveStatus('loading');
  prices={}; times={}; amHours={}; avHours={}; packPrices={}; weddingConfig={}; coursePrices={}; adicionales={}; avTarifas={};
  try {
    const res = await fetch(`${SCRIPT_URL}?pin=${CORRECT_PIN}`);
    const json = await res.json();
    if(!json.ok) throw new Error(json.error||'Error al cargar');
    if(json.data) {
      prices=json.data.prices||{}; times=json.data.times||{};
      amHours=json.data.amHours||{}; avHours=json.data.avHours||{};
      packPrices=json.data.packPrices||{}; weddingConfig=json.data.weddingConfig||{};
      coursePrices=json.data.coursePrices||{}; adicionales=json.data.adicionales||{};
      avTarifas=json.data.avTarifas||{};
      if(json.data.tarifaDireccion) {
        tarifaDireccion=json.data.tarifaDireccion;
        document.getElementById('tarifaHoraInput').value=tarifaDireccion;
        updateTarifaChips();
      }
      showToast('Datos cargados ✓','ok');
    }
    driveLoadedOk=true; setSaveStatus('saved');
  } catch(e) { driveLoadedOk=false; setSaveStatus('error'); showToast('⚠️ No se pudo cargar. No se guardarán cambios.','error'); }
}

async function saveToScript() {
  if(!driveLoadedOk){ setSaveStatus('error'); showToast('⚠️ No se guardó: hubo un error al cargar. Recargá la página.','error'); return; }
  setSaveStatus('saving');
  const payload = { pin:CORRECT_PIN, prices, times, amHours, avHours, packPrices, weddingConfig, coursePrices, adicionales, avTarifas, tarifaDireccion };
  try {
    const res = await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(payload)});
    const json = await res.json();
    if(!json.ok) throw new Error(json.error);
    setSaveStatus('saved'); showToast('Guardado ✓','ok');
  } catch(e) { setSaveStatus('error'); showToast('Error al guardar. Intentá de nuevo.','error'); }
}

function scheduleSave() { if(!driveLoadedOk){setSaveStatus('error');return;} clearTimeout(saveTimer); setSaveStatus('saving'); saveTimer=setTimeout(saveToScript,1500); }
function setSaveStatus(s) {
  const dot=document.getElementById('saveDot'), txt=document.getElementById('saveText');
  dot.className='save-dot';
  if(s==='saved'){dot.classList.add('saved');txt.textContent='Guardado';}
  else if(s==='saving'){dot.classList.add('saving');txt.textContent='Guardando...';}
  else if(s==='error'){dot.classList.add('error');txt.textContent='⚠️ Error al guardar — recargá';}
  else if(s==='loading'){dot.classList.add('saving');txt.textContent='Cargando...';}
  else{txt.textContent='Sin cambios';}
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer2;
function showToast(msg,type) {
  const t=document.getElementById('toast'),dot=document.getElementById('toastDot');
  document.getElementById('toastMsg').textContent=msg;
  dot.style.background=type==='ok'?'var(--lime)':type==='error'?'var(--red)':'var(--orange)';
  t.classList.add('show'); clearTimeout(toastTimer2); toastTimer2=setTimeout(()=>t.classList.remove('show'),5000);
}

// ─── FMT ──────────────────────────────────────────────────────────────────────
function fmt(n) { return '$ '+Math.round(n).toLocaleString('es-AR'); }
function fmtUSD(ars) { if(!fxRate||!ars) return null; return 'U$S '+(ars/fxRate).toLocaleString('es-AR',{minimumFractionDigits:2}); }
function fmtUSDIntl(ars) { if(!fxRate||!ars) return null; return 'U$S '+(ars/fxRate*1.2).toLocaleString('es-AR',{minimumFractionDigits:2})+' (+20%)'; }
function priceChips(ars) {
  if(!ars||ars===0) return '';
  let html = `<div class="price-subs" style="margin-top:4px">`;
  const u=fmtUSD(ars), ui=fmtUSDIntl(ars);
  if(u) html+=`<span class="price-sub-chip">${u}</span>`;
  if(ui) html+=`<span class="price-sub-chip" style="opacity:.7">${ui}</span>`;
  html+=`</div>`;
  return html;
}

// ─── AM HELPERS ───────────────────────────────────────────────────────────────
function getAmHours(id) { return {...AM_DEFAULT_HOURS,...(amHours[id]||{})}; }
function getAmTotalHoras(id) { const h=getAmHours(id); let t=h.briefing+h.supervision+h.reuniones+h.presentacion; if(h.tieneAudiovisual)t+=h.rodaje; return t; }
function getAmCosto(id) { return getAmTotalHoras(id)*tarifaDireccion; }
function getAvCosto(id) {
  const h=avHours[id]||0; if(h<=0) return 0;
  const t=avTarifas[id]||{};
  const p1=t.primera||160000, pr=t.resto||80000;
  if(h<=1) return p1*h;
  return p1+(h-1)*pr;
}
function getPackPrice(id,pk) { return (packPrices[id]&&packPrices[id][pk])||0; }
function countFilledPacks(svc) { return svc.packs.filter(p=>getPackPrice(svc.id,p.key)>0).length; }
function getWeddingCfg(id) { return weddingConfig[id]||{tarifaHora:0}; }
function getWeddingTotal(id,horas) { const cfg=getWeddingCfg(id); return (cfg.tarifaHora||0)*(horas||0); }
function getCoursePrice(id,key) { return (coursePrices[id]&&coursePrices[id][key])||0; }

// ─── PROGRESS ─────────────────────────────────────────────────────────────────
function isServiceFilled(section,s) {
  const t=s.type||section.type;
  if(t==='am'||t==='am_puntual') return getAmCosto(s.id)>0;
  if(t==='decreasing') return (avHours[s.id]||0)>0;
  if(t==='catalog') return s.packs&&countFilledPacks(s)===s.packs.length&&s.packs.length>0;
  if(t==='hourly_wedding') return (getWeddingCfg(s.id).tarifaHora||0)>0;
  if(t==='course') { if(s.id==='curso_capacitacion_corporativa') return getCoursePrice(s.id,'unico')>0; return getCoursePrice(s.id,'grupal')>0&&getCoursePrice(s.id,'particular')>0; }
  return (prices[s.id]||0)>0;
}
function countFilledInSection(sec) { return sec.services.filter(s=>isServiceFilled(sec,s)).length; }
function updateGlobalProgress() {
  let filled=0,total=0;
  SECTIONS.forEach(sec=>{total+=sec.services.length;filled+=countFilledInSection(sec);});
  const pct=total?Math.round(filled/total*100):0;
  document.getElementById('globalFill').style.width=pct+'%';
  document.getElementById('globalPct').textContent=pct+'%';
}

// ─── RENDER PRINCIPAL ─────────────────────────────────────────────────────────
function renderServices() {
  const container=document.getElementById('servicesContent');
  container.innerHTML='';
  SECTIONS.forEach(section=>{
    const filled=countFilledInSection(section);
    const total=section.services.length;
    const indClass=filled===0?'':filled===total?'complete':'partial';
    const isOpen=openSections.has(section.id);
    const block=document.createElement('div');
    block.className='section-block';
    block.innerHTML=`
      <div class="section-header ${isOpen?'open':''}" onclick="toggleSection(this,'${section.id}')">
        <div class="section-header-left">
          <div class="section-indicator ${indClass}" id="ind-${section.id}"></div>
          <span class="section-name">${section.name}</span>
        </div>
        <div class="section-meta">
          <span class="section-count" id="count-${section.id}">${filled} / ${total}</span>
          <span class="chevron">${isOpen?'▲':'▼'}</span>
        </div>
      </div>
      <div class="section-body ${isOpen?'open':''}" id="body-${section.id}"></div>
    `;
    container.appendChild(block);
    const body=block.querySelector(`#body-${section.id}`);
    if(section.note){
      const n=document.createElement('div');
      n.className='note-box'; n.style.margin='16px 20px 0 20px';
      n.innerHTML=`<strong>Cómo usar esta sección:</strong> ${section.note}`;
      body.appendChild(n);
    }
    section.services.forEach(svc=>renderCard(body,section,svc));
  });
}

function renderCard(body,section,svc) {
  const card=document.createElement('div');
  card.className='service-card';
  const t=svc.type||section.type;
  if(t==='am'||t==='am_puntual') renderAmCard(card,svc,t==='am_puntual');
  else if(t==='decreasing') renderDecreasingCard(card,svc);
  else if(t==='catalog') renderCatalogCard(card,svc);
  else if(t==='hourly_wedding') renderWeddingCard(card,svc);
  else if(t==='course') renderCourseCard(card,svc);
  else renderSimpleCard(card,svc);
  if(svc.allowAdicional) appendAdicional(card,svc);

}

// ─── HANDLERS ─────────────────────────────────────────────────────────────────
function onAmHoursChange(id,key,input) {
  const val=parseFloat(input.value)||0;
  if(!amHours[id]) amHours[id]={...AM_DEFAULT_HOURS};
  amHours[id][key]=val; updateAmTotal(id); updateGlobalProgress(); scheduleSave();
}
function onAmToggle(id,cb) {
  if(!amHours[id]) amHours[id]={...AM_DEFAULT_HOURS};
  amHours[id].tieneAudiovisual=cb.checked; updateAmTotal(id); updateGlobalProgress(); scheduleSave();
}
function onAvHoursInput(id,input) {
  avHours[id]=parseFloat(input.value)||0;
  // Solo actualiza el breakdown visible sin re-renderizar
  updateDecreasingBreakdown(id);
  updateGlobalProgress(); scheduleSave();
}
function onAvTarifaChange(id,field,input) {
  if(!avTarifas[id]) avTarifas[id]={primera:160000,resto:80000};
  avTarifas[id][field]=parseFloat(input.value)||0;
  updateDecreasingBreakdown(id);
  updateGlobalProgress(); scheduleSave();
}
function onPriceInput(id,input) {
  const val=parseFloat(input.value)||0;
  prices[id]=val;
  input.classList.toggle('has-value',val>0);
  const chipsEl=document.getElementById('chips-'+id);
  if(chipsEl) chipsEl.innerHTML=priceChips(val);
  updateGlobalProgress(); scheduleSave();
}
function onPackPriceInput(id,pk,input) {
  const val=parseFloat(input.value)||0;
  if(!packPrices[id]) packPrices[id]={};
  packPrices[id][pk]=val;
  input.classList.toggle('has-value',val>0);
  updatePackChips(id,pk,val,input);
  updateGlobalProgress(); scheduleSave();
}
function onWeddingTarifaChange(id,input) {
  if(!weddingConfig[id]) weddingConfig[id]={tarifaHora:0};
  const val=parseFloat(input.value)||0;
  weddingConfig[id].tarifaHora=val;
  const chipsEl=document.getElementById('chips-'+id);
  if(chipsEl) chipsEl.innerHTML=priceChips(val);
  const restoEl=document.getElementById('wedding-resto-'+id);
  const tarifaResto=Math.round(val*0.75);
  if(restoEl) restoEl.innerHTML=val?`2da hora en adelante: <strong style="color:var(--text)">${fmt(tarifaResto)}</strong> (−25%)`:'Cargá la tarifa para ver el cálculo.';
  updateGlobalProgress(); scheduleSave();
}
function onCoursePriceInput(id,key,input) {
  const val=parseFloat(input.value)||0;
  if(!coursePrices[id]) coursePrices[id]={};
  coursePrices[id][key]=val;
  input.classList.toggle('has-value',val>0);
  updatePackChips(id,key,val,input);
  updateGlobalProgress(); scheduleSave();
}
function onAdicionalChange(id,field,input) {
  if(!adicionales[id]) adicionales[id]={desc:'',precio:0};
  if(field==='desc'){ adicionales[id].desc=input.value; scheduleSave(); return; }
  const val=parseFloat(input.value)||0;
  adicionales[id].precio=val; input.classList.toggle('has-value',val>0); scheduleSave();
}

// Actualiza el total de dirección inline sin re-renderizar
function updateAmTotal(id) {
  const costo = getAmCosto(id);
  const totalHoras = getAmTotalHoras(id);
  const h = getAmHours(id);

  // Actualizar cada resultado de hora
  Object.keys(ACTIVITY_LABELS).forEach(key => {
    const isRodaje = key === 'rodaje';
    const disabled = isRodaje && !h.tieneAudiovisual;
    const resultEl = document.querySelector(`[data-hours-result="${id}-${key}"]`);
    if(resultEl) resultEl.textContent = disabled ? '—' : fmt(h[key] * tarifaDireccion);
    // Deshabilitar/habilitar input de rodaje
    const inputEl = document.querySelector(`[data-hours-input="${id}-${key}"]`);
    if(inputEl) inputEl.disabled = disabled;
  });

  // Actualizar total
  const totalEl = document.querySelector(`[data-am-total="${id}"]`);
  if(totalEl) {
    totalEl.innerHTML = `<div class="am-total-value">${fmt(costo)}</div>${priceChips(costo)}`;
  }

  // Actualizar price block superior
  const blockEl = document.querySelector(`[data-am-block="${id}"]`);
  if(blockEl) {
    blockEl.innerHTML = `
      <div class="price-status ${costo>0?'filled':''}">${costo>0?'Calculado':'Pendiente'}</div>
      <div class="price-big" style="color:${costo>0?'var(--lime)':'var(--text)'}">${fmt(costo)}</div>
      ${priceChips(costo)}
      <div class="price-label">${totalHoras}hs · $${tarifaDireccion.toLocaleString('es-AR')}/hora</div>
    `;
  }
}
function updatePriceChipsFor(containerId, ars) {
  const el=document.getElementById(containerId); if(!el) return;
  if(!ars||!fxRate){ el.innerHTML=''; return; }
  el.innerHTML=`<span class="price-sub-chip">${fmtUSD(ars)||''}</span><span class="price-sub-chip" style="opacity:.7">${fmtUSDIntl(ars)||''}</span>`;
}
function updatePackChips(id,pk,val,input) {
  const chipsEl=input.closest('.hours-item')?.querySelector('.pack-chips-inline');
  if(!chipsEl) return;
  if(!val||!fxRate){ chipsEl.textContent=''; return; }
  chipsEl.innerHTML=`${fmtUSD(val)||''} · ${fmtUSDIntl(val)||''}`;
}
function updateDecreasingBreakdown(id) {
  const el=document.querySelector(`[data-breakdown="${id}"]`); if(!el) return;
  const horas=avHours[id]||0, t=avTarifas[id]||{primera:160000,resto:80000};
  const p1=t.primera||160000, pr=t.resto||80000;
  if(!horas){ el.textContent='Ingresá las horas para ver el desglose del cálculo.'; return; }
  const costo=horas<=1?p1*horas:p1+(horas-1)*pr;
  el.textContent=horas<=1?`${horas}hs × ${fmt(p1)} (1ra hora) = ${fmt(costo)}`:`1ra hora: ${fmt(p1)} + ${horas-1}hs × ${fmt(pr)} = ${fmt(costo)}`;
}

// ─── TOGGLE ───────────────────────────────────────────────────────────────────
function toggleSection(header,id) {
  if(openSections.has(id)) openSections.delete(id); else openSections.add(id);
  header.classList.toggle('open');
  const body=document.getElementById('body-'+id);
  body.classList.toggle('open');
  header.querySelector('.chevron').textContent=body.classList.contains('open')?'▲':'▼';
}
function toggleDetail(id,btn) {
  const el=document.getElementById(id); el.classList.toggle('open');
  btn.innerHTML=el.classList.contains('open')?'<span>▲</span> Ocultar detalle':'<span>▼</span> Ver detalle de este servicio';
}

// ─── FORMAT TASKS ─────────────────────────────────────────────────────────────
function formatTasks(text) {
  const lines=text.split('\n'); let html='';
  for(const line of lines) {
    const t=line.trim(); if(!t) continue;
    const isBullet=t.startsWith('•')||t.startsWith('-');
    if(!isBullet) {
      const ci=t.indexOf(':');
      if(ci>0&&ci<t.length-1){ html+=`<span class="task-title">${t.slice(0,ci+1).trim()}</span><span class="task-line">${t.slice(ci+1).trim()}</span>`; continue; }
      if(t.endsWith(':')){ html+=`<span class="task-title">${t}</span>`; continue; }
    }
    html+=`<span class="task-line">${t}</span>`;
  }
  return html;
}
